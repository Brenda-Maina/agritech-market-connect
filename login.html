<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AgriTech Market Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-deep: #1a3a1f;
      --green-mid: #2d6a35;
      --green-bright: #4caf50;
      --green-light: #a8d5ab;
      --green-pale: #e8f5e9;
      --cream: #faf7f2;
      --accent: #f4a534;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 5%;
      background: rgba(26,58,31,0.97);
      border-bottom: 1px solid rgba(76,175,80,0.2);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      color: #a8d5ab;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
    }
    .nav-logo span { color: #f4a534; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #a8d5ab; }
    .auth-wrapper {
      margin-top: 5rem;
      width: 100%;
      max-width: 460px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo h1 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.8rem;
    }
    .auth-logo h1 span { color: var(--accent); }
    .auth-logo p { color: rgba(255,255,255,0.45); font-size: 0.9rem; margin-top: 0.3rem; }
    .auth-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(76,175,80,0.2);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(10px);
    }
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--green-mid);
      color: #fff;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.25); }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--green-bright);
    }
    .form-group select option { background: #1a3a1f; color: #fff; }
    .btn-submit {
      width: 100%;
      background: var(--green-bright);
      color: var(--green-deep);
      border: none;
      border-radius: 10px;
      padding: 0.95rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--green-light); transform: translateY(-2px); }
    .form-footer {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }
    .form-footer a { color: var(--green-light); text-decoration: none; }
    .panel { display: none; }
    .panel.active { display: block; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--green-light); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">AgriTech <span>Market Connect</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="farmers.html">Farmers</a></li>
      <li><a href="order.html">Order</a></li>
    </ul>
  </nav>

  <div class="auth-wrapper">
    <a href="index.html" class="back-link">← Back to Home</a>
    <div class="auth-logo">
      <h1>AgriTech <span>Market Connect</span></h1>
      <p>Sign in or create your account to get started</p>
    </div>
    <div class="auth-card">
      <div class="tabs">
        <div class="tab active" onclick="showPanel('login', this)">Sign In</div>
        <div class="tab" onclick="showPanel('register', this)">Register</div>
      </div>

      <div class="panel active" id="login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" />
        </div>
        <button class="btn-submit">Sign In</button>
        <p class="form-footer">Don't have an account? <a href="#" onclick="showPanel('register', document.querySelectorAll('.tab')[1])">Register here</a></p>
      </div>

      <div class="panel" id="register">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="e.g. Jane Wanjiru" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="+254 7XX XXX XXX" />
        </div>
        <div class="form-group">
          <label>I am a</label>
          <select>
            <option value="">Select your role</option>
            <option>Farmer</option>
            <option>Buyer / Grocery Partner</option>
            <option>Digital Champion</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a password" />
        </div>
        <button class="btn-submit">Create Account</button>
        <p class="form-footer">Already have an account? <a href="#" onclick="showPanel('login', document.querySelectorAll('.tab')[0])">Sign in</a></p>
      </div>
    </div>
  </div>

  <script>
    function showPanel(id, tabEl) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      tabEl.classList.add('active');
    }
  </script>
</body>
</html>
